name: Agent Tests

on:
  push:
    paths:
      - "**.py"
      - "pyproject.toml"
      - "manifest.json"
      - "schemas/**"
      - "examples/**"
      - "tests/**"
      - ".github/workflows/tests.yml"
  pull_request:
    paths:
      - "**.py"
      - "pyproject.toml"
      - "manifest.json"
      - "schemas/**"
      - "examples/**"
      - "tests/**"
      - ".github/workflows/tests.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Install dependencies
        run: uv sync --dev
      - name: Run tests
        run: make test
